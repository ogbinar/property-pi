services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    working_dir: /app
    command: sh -c "npm run build && npm run preview -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: sqlite:////data/property_pi.db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
      ALLOWED_ORIGINS: "http://property-pi.apps.ogbinar.com,https://property-pi.apps.ogbinar.com"
    volumes:
      - backend_db_data:/data
    restart: unless-stopped

volumes:
  backend_db_data:
