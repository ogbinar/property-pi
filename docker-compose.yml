# Property-Pi — 2-service Docker Compose
# Frontend: Next.js (port 3000)
# Backend: FastAPI + SQLite (port 8000)
# Routing via Traefik on dokploy-network

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://property-pi.apps.ogbinar.com
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - dokploy-network
      - default
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.property-pi.rule=Host(`property-pi.apps.ogbinar.com`) && !PathPrefix(`/api`)
      - traefik.http.routers.property-pi.entrypoints=web
      - traefik.http.routers.property-pi.service=property-pi
      - traefik.http.services.property-pi.loadbalancer.server.port=3000

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: sqlite:////data/property_pi.db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
      ALLOWED_ORIGINS: http://property-pi.apps.ogbinar.com
    volumes:
      - backend_db_data:/data
    restart: unless-stopped
    networks:
      - dokploy-network
      - default
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.property-pi-api.rule=Host(`property-pi.apps.ogbinar.com`) && PathPrefix(`/api`)
      - traefik.http.routers.property-pi-api.entrypoints=web
      - traefik.http.routers.property-pi-api.service=property-pi-api
      - traefik.http.services.property-pi-api.loadbalancer.server.port=8000

volumes:
  backend_db_data:

networks:
  dokploy-network:
    external: true
  default:
