services:
  # PocketBase - Database & Auth
  pocketbase:
    image: frodenas/pocketbase:0.24.0
    container_name: property-pi-pb
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb_data
    environment:
      PB_HTTP_ENABLE: "true"
      PB_HOST: "0.0.0.0"
      PB_PORT: "8090"
    restart: unless-stopped
    networks:
      - property-pi-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FastAPI Backend - Aggregation & Automation
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: property-pi-api
    ports:
      - "8000:8000"
    environment:
      BACKEND_POCKETBASE_URL: http://pocketbase:8090
      BACKEND_POCKETBASE_ADMIN_TOKEN: ${BACKEND_POCKETBASE_ADMIN_TOKEN}
      BACKEND_FASTAPI_PORT: 8000
      BACKEND_SECRET_KEY: ${BACKEND_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      pocketbase:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - property-pi-network

  # Next.js Frontend
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: property-pi-app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_POCKETBASE_URL: ${NEXT_PUBLIC_POCKETBASE_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_started
      pocketbase:
        condition: service_started
    restart: unless-stopped
    networks:
      - property-pi-network
    # Dokploy health check
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pb_data:
    driver: local

networks:
  property-pi-network:
    driver: bridge
